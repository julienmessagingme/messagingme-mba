openapi: 3.1.1
info:
  title: Connector Tools
  version: 2.0.0
  summary: |
    Manage tool (endpoint/operation) definitions for a specific connector.
  description: |
    This endpoint provides CRUD operations for managing tool definitions for a specific connector. Tools define the individual operations (endpoints) available on an external API, including the canonical outbound request definition and user-auth extraction metadata. Each tool must have a descriptive `name` and `description` so the agent knows when and how to use it. In the `request_definition`, define the body schema with explicit field types, descriptions, and required fields rather than using unstructured objects — the agent uses this schema to extract the correct values from the conversation and build valid API requests.
  license:
    name: Meta Business AI Terms of Service
    url: |
      https://www.facebook.com/legal/3774714022740775
