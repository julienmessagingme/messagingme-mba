              - 2.0.0
components:
  schemas:
    BizAIKnowledgeWebsiteRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: The URL of the website to crawl
          example: https://www.example.com
    BizAIKnowledgeWebsiteResponse:
      type: object
      required:
        - id
        - url
      properties:
        id:
          type: string
          description: |
            The unique identifier for this website crawl entry
          example: '1234567890'
        url:
          type: string
          description: The URL of the website being crawled
          example: https://www.example.com
        crawl_status:
          type: string
          description: |
            The current status of the crawl (e.g., "pending", "in_progress", "completed", "failed")
          example: COMPLETED
        pages_crawled:
          type: integer
          description: The number of pages successfully crawled
          example: 42
        last_crawled_at:
          type: integer
          description: |
            The timestamp when the website was last successfully crawled
          example: 1714500000
        created_at:
          type: integer
          description: |
            The timestamp when the website entry was created
          example: 1714500000
    StandardError:
      type: object
      required:
        - title
        - detail
      properties:
        title:
          type: string
        detail:
          type: string
        type:
          type: string
        status:
          type: integer
  securitySchemes:
    OAuthToken__Authorization:
      type: http
      scheme: bearer
security:
  - 
    OAuthToken__Authorization: [ ]
