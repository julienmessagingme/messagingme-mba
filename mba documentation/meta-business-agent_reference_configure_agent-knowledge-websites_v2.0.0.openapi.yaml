      summary: Delete a knowledge website
      description: |
        Delete a specific website crawl entry from the knowledge base by its ID
      operationId: deleteKnowledgeWebsite
      tags:
        - Business AI
        - Knowledge
      parameters:
        - 
          name: entity_id
          in: path
          description: |
            The WhatsApp Business Phone Number ID for the Meta Business Agent.
          required: true
          schema:
            type: string
        - 
          name: website_id
          in: path
          description: |
            The unique identifier of the website crawl entry
          required: true
