components:
  schemas:
    BizAIOmniChannelSkillsRequest:
      type: object
      properties:
        title:
          type: string
          description: |
            A human-readable name for the skill. Max 64 characters. Must contain only lowercase letters, numbers, and hyphens, and must not start or end with a hyphen. Use a descriptive title that makes the skill's purpose clear (e.g., `greeting-skill`, `product-return-policy`). Avoid generic titles like `skill-1`.
          example: greeting-skill
        description:
          type: string
          description: |
            A description telling the AI when to apply this skill. Max 1024 characters. Be specific about the trigger or context — for example, "Apply when the customer first messages the agent" or "Apply when the customer asks about returns or refunds." The agent uses this to decide which skills are relevant to the current conversation.
          example: |
            Apply when the customer first messages the agent to set the greeting tone and collect initial context.
        skill:
          type: string
          description: |
            The body containing the actual instructions for the AI. Max 20000 characters. Write clear, non-conflicting directives. Avoid having multiple skills that each claim priority for the same situation (e.g., two skills that both say "do this first" on the first message) — the agent cannot resolve conflicting priorities and may produce duplicate or inconsistent responses. If multiple actions should happen on the same trigger, consolidate them into a single skill with an explicit sequence of steps.
          example: 'When a customer sends their first message: 1) Look up their contact info, 2) Check business hours, 3) Greet them by name and ask how you can help.'
    BizAIOmniChannelSkillsResponse:
      type: object
      required:
        - id
        - skill
        - channel
      properties:
        id:
          type: string
          description: A unique identifier for the skill
          example: '1234567890'
        title:
          type: string
          description: |
            An optional, human-readable name for the skill
          example: Greeting Skill
        description:
          type: string
          description: |
            A description telling the AI when to apply this skill
          example: How the agent should greet customers
        skill:
          type: string
          description: |
            The body containing the actual instructions for the AI. Has no specific restrictions on structure or content.
          example: |
            Always greet the customer by name and ask how you can help
        channel:
          type: string
          description: |
            The channel/platform this skill applies to
          example: WHATSAPP
          enum:
            - email
            - instagram
            - line
            - messenger
            - sms
            - tiktok
            - unknown
            - webchat
            - whatsapp
        created_at:
          type: integer
          description: The timestamp when the skill was created
          example: 1714500000
        metadata:
          type: object
          description: |
            A map of key-value pairs for additional metadata
          additionalProperties:
            type: string
    StandardError:
      type: object
      required:
        - title
        - detail
      properties:
        title:
          type: string
        detail:
          type: string
        type:
          type: string
        status:
          type: integer
