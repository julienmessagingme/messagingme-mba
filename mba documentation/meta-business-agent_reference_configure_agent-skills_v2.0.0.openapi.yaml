info:
  title: Agent Skills
  version: 2.0.0
  summary: |
    Manage AI agent skills for a specific entity (WhatsApp Business Phone Number).
  description: |
    This endpoint provides CRUD operations for managing AI agent skills for a specific entity (WhatsApp Business Phone Number). Skills define behavioral guidelines, tone of voice, and response patterns for the AI agent. The agent follows skills as written, so write them as clear directives. Avoid conflicting skills — if two skills both claim priority for the same situation (e.g., both say "do this first" when a customer messages), the agent may produce duplicate or inconsistent responses. When multiple actions should happen on the same trigger, consolidate them into a single skill with explicitly ordered steps.
  license:
    name: Meta Business AI Terms of Service
    url: |
      https://www.facebook.com/legal/3774714022740775
