components:
  schemas:
    BizAIOmniChannelKnowledgeFAQRequest:
      type: object
      required:
        - question
        - answer
      properties:
        question:
          type: string
          description: |
            The FAQ question text. Write it as a natural question a customer would ask. Each FAQ should address a single, specific topic. For example, use "What is your return policy?" rather than "Returns, exchanges, and refunds" — the agent matches questions more accurately when they mirror how customers phrase them.
          example: What is your return policy?
        answer:
          type: string
          description: |
            The FAQ answer text. Keep answers factual, concise, and self-contained. Include all the information needed to fully answer the question without requiring the customer to ask follow-ups. Avoid referencing other FAQ entries — the agent retrieves each entry independently.
          example: |
            We offer a 30-day return policy for unused items in their original packaging. To start a return, visit your order history and select the item you want to return. Refunds are processed within 5-7 business days.
        metadata:
          type: object
          description: |
            Key-value metadata associated with this FAQ entry
          additionalProperties:
            type: string
    BizAIOmniChannelKnowledgeFAQResponse:
      type: object
      required:
        - id
        - question
        - answer
      properties:
        id:
          type: string
          description: The unique identifier for this FAQ entry
          example: '1234567890'
        question:
          type: string
          description: The FAQ question text
          example: What is your return policy?
        answer:
          type: string
          description: The FAQ answer text
          example: |
            We offer a 30-day return policy for unused items
        created_at:
          type: integer
          description: The timestamp when the FAQ was created
          example: 1714500000
        metadata:
          type: object
          description: |
            Key-value metadata associated with this FAQ entry
          additionalProperties:
            type: string
    StandardError:
      type: object
      required:
        - title
        - detail
      properties:
        title:
          type: string
        detail:
          type: string
        type:
          type: string
        status:
          type: integer
  securitySchemes:
    OAuthToken__Authorization:
      type: http
      scheme: bearer
security:
  - 
    OAuthToken__Authorization: [ ]
