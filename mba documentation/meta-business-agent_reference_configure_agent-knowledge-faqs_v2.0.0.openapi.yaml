info:
  title: 'Agent Knowledge - FAQs'
  version: 2.0.0
  summary: |
    Manage FAQ entries in the AI agent knowledge base for a specific entity.
  description: |
    This endpoint provides CRUD operations for managing FAQ entries in the AI agent knowledge base for a specific entity. FAQs are question-answer pairs that the agent references when responding to customer queries. Each FAQ entry has a question, answer, optional type, source, and tags. For best results, keep FAQs focused and concise — each entry should address a single, specific question. Adding too many FAQs (generally beyond a few hundred) can degrade the agent's ability to find the right answer. Prioritize the questions your customers ask most frequently and keep answers factual and direct.
