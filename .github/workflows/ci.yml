name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          # Même version que les images de production (node:22-alpine, Dockerfile et web/Dockerfile).
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Postgres LOCAL sans TLS -> SSL désactivé (sinon « server does not support SSL »).
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      DB_SSL: 'off'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          # Même version que les images de production (node:22-alpine, Dockerfile et web/Dockerfile).
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Migrations (crée le schéma applicatif)
        run: npm run migrate
      - name: Tests d'intégration (pg-boss + stores + e2e contre Postgres éphémère)
        run: npm run test:integration
