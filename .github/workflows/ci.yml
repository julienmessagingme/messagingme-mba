name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
    # NB : les tests d'intégration (npm run test:integration) tapent Supabase et sont
    # exécutés localement pour l'instant. Job d'intégration CI (service Postgres) = à ajouter.
